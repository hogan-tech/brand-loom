name: Bug report
description: Report a bug in brand-loom
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install brand-loom
        2. Run `brand-loom run hook --text "..."`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
  - type: input
    id: version
    attributes:
      label: brand-loom version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "fake / openai / anthropic / gemini / ollama"
